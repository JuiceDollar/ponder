name: JuiceDollar Ponder PRD CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_TAGS: dfxswiss/juicedollar-ponder:latest
  AZURE_RESOURCE_GROUP: rg-dfx-api-prd
  AZURE_CONTAINER_APP_TESTNET: ca-dfx-jdtp-prd
  AZURE_CONTAINER_APP_MAINNET: ca-dfx-jdmp-prd
  DEPLOY_INFO: ${{ github.ref_name }}-${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, test and deploy to PRD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAGS }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DFX_PRD_CREDENTIALS }}

      - name: Update Azure Container App (testnet)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Updating container app ${{ env.AZURE_CONTAINER_APP_TESTNET }}"

            CURRENT_REVISION=$(az containerapp revision list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_TESTNET }} \
              --query "[?properties.active].name" \
              --output tsv | head -1)

            az containerapp update \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_TESTNET }} \
              --image ${{ env.DOCKER_TAGS }} \
              --revision-suffix $(date +%s) \
              --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}

            if [ -n "$CURRENT_REVISION" ]; then
              echo "Deactivating previous revision: $CURRENT_REVISION"
              az containerapp revision deactivate \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --name ${{ env.AZURE_CONTAINER_APP_TESTNET }} \
                --revision $CURRENT_REVISION
            else
              echo "No previous revision to deactivate"
            fi

      - name: Update Azure Container App (mainnet)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Updating container app ${{ env.AZURE_CONTAINER_APP_MAINNET }}"

            CURRENT_REVISION=$(az containerapp revision list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_MAINNET }} \
              --query "[?properties.active].name" \
              --output tsv | head -1)

            az containerapp update \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_MAINNET }} \
              --image ${{ env.DOCKER_TAGS }} \
              --revision-suffix $(date +%s) \
              --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}

            if [ -n "$CURRENT_REVISION" ]; then
              echo "Deactivating previous revision: $CURRENT_REVISION"
              az containerapp revision deactivate \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --name ${{ env.AZURE_CONTAINER_APP_MAINNET }} \
                --revision $CURRENT_REVISION
            else
              echo "No previous revision to deactivate"
            fi

      - name: Logout from Azure
        run: |
          az logout
        if: always()


