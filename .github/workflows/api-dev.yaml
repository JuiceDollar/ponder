name: JuiceDollar Ponder DEV CI/CD

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DOCKER_TAGS: dfxswiss/juicedollar-ponder:beta
  AZURE_RESOURCE_GROUP: rg-dfx-api-dev
  AZURE_CONTAINER_APP_1: ca-dfx-jdtp-dev
  AZURE_CONTAINER_APP_2: ca-dfx-jdmp-dev
  DEPLOY_INFO: ${{ github.ref_name }}-${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, test and deploy to DEV
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAGS }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DFX_DEV_CREDENTIALS }}

      - name: Update Azure Container App 1
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Updating container app ${{ env.AZURE_CONTAINER_APP_1 }}"

            CURRENT_REVISION=$(az containerapp revision list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_1 }} \
              --query "[?properties.active].name" \
              --output tsv | head -1)

            az containerapp update \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_1 }} \
              --image ${{ env.DOCKER_TAGS }} \
              --revision-suffix $(date +%s) \
              --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}

            if [ -n "$CURRENT_REVISION" ]; then
              echo "Deactivating previous revision: $CURRENT_REVISION"
              az containerapp revision deactivate \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --name ${{ env.AZURE_CONTAINER_APP_1 }} \
                --revision $CURRENT_REVISION
            else
              echo "No previous revision to deactivate"
            fi

      - name: Update Azure Container App 2
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Updating container app ${{ env.AZURE_CONTAINER_APP_2 }}"

            CURRENT_REVISION=$(az containerapp revision list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_2 }} \
              --query "[?properties.active].name" \
              --output tsv | head -1)

            az containerapp update \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP_2 }} \
              --image ${{ env.DOCKER_TAGS }} \
              --revision-suffix $(date +%s) \
              --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}

            if [ -n "$CURRENT_REVISION" ]; then
              echo "Deactivating previous revision: $CURRENT_REVISION"
              az containerapp revision deactivate \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --name ${{ env.AZURE_CONTAINER_APP_2 }} \
                --revision $CURRENT_REVISION
            else
              echo "No previous revision to deactivate"
            fi

      - name: Logout from Azure
        run: |
          az logout
        if: always()


