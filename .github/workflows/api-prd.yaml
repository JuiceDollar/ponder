name: dEURO Ponder PRD CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_schema:
        description: 'Create new schema version (resets database)'
        required: false
        default: false
        type: boolean

env:
  DOCKER_TAGS: dfxswiss/deuro-ponder:latest
  AZURE_RESOURCE_GROUP: rg-dfx-api-prd
  AZURE_CONTAINER_APP: ca-dfx-dep-prd
  DEPLOY_INFO: ${{ github.ref_name }}-${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build, test and deploy to PRD
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_TAGS }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DFX_PRD_CREDENTIALS }}

      - name: Update Azure Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Updating container app${{ inputs.reset_schema == true && ' (with schema reset)' || '' }}"

            CURRENT_REVISION=$(az containerapp revision list \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --query "[?properties.active].name" \
              --output tsv | head -1)
            
            echo "CURRENT_REVISION=$CURRENT_REVISION" >> $GITHUB_ENV
            
            az containerapp update \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --image ${{ env.DOCKER_TAGS }} \
              --set-env-vars DEPLOY_INFO=${{ env.DEPLOY_INFO }}${{ inputs.reset_schema == true && format(' PONDER_SCHEMA_VERSION={0}', github.run_number) || '' }}

            az containerapp revision deactivate \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --revision $CURRENT_REVISION

      - name: Logout from Azure
        run: |
          az logout
        if: always()
